name: Hello World Action

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Example dependency setup (Node)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: prime-cache-2a6947b
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: cache-2a6947b

      - name: Show cache result
        run: echo "Cache hit? ${{ steps.cache.outputs.cache-hit }}"
